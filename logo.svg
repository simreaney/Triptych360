<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    
    <!-- Vivid Blue Gradient for Center -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#32ADE6" />
      <stop offset="100%" stop-color="#007AFF" />
    </linearGradient>
    
    <!-- Darker Blue Gradient for Side Panels (adds depth) -->
    <linearGradient id="dark-blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#007AFF" />
      <stop offset="100%" stop-color="#004699" />
    </linearGradient>
  </defs>

  <!-- App Icon Shape -->
  <rect width="500" height="500" rx="100" fill="url(#bg)" />

  <!-- Background Halo / 360 Ring Indicator -->
  <path d="M 70,210 C 70,100 430,100 430,210" fill="none" stroke="#2c2c2e" stroke-width="8" stroke-linecap="round"/>
  <path d="M 430,210 C 430,320 70,320 70,210" fill="none" stroke="#2c2c2e" stroke-width="8" stroke-dasharray="10 15" stroke-linecap="round"/>
  
  <!-- Highlighted section of the 360 Ring -->
  <path d="M 70,210 C 70,120 430,120 430,210" fill="none" stroke="url(#blue-grad)" stroke-width="6" stroke-linecap="round" />

  <!-- Left Panel (Trapezoid representing angled screen) -->
  <path d="M 120,150 L 180,170 L 180,280 L 120,300 Z" fill="url(#dark-blue-grad)" stroke="#000000" stroke-width="2"/>
  
  <!-- Right Panel (Trapezoid representing angled screen) -->
  <path d="M 380,150 L 320,170 L 320,280 L 380,300 Z" fill="url(#dark-blue-grad)" stroke="#000000" stroke-width="2"/>
  
  <!-- Center Panel (Rounded Rect overlapping the sides) -->
  <rect x="190" y="160" width="120" height="130" rx="6" fill="url(#blue-grad)" stroke="#000000" stroke-width="4"/>

  <!-- Logo Text -->
  <text x="250" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">TRIPTYCH<tspan fill="#32ADE6">360</tspan></text>
  
  <!-- Subtitle -->
  <text x="250" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#88888b" text-anchor="middle" letter-spacing="4">VIDEO WALL CONTROLLER</text>
</svg>